<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./login.css">
    <link rel="stylesheet" href="./reset.css">
</head>
<body>
    <div class="wrap">
        <div class="imgBox">
            <img src="./노드 로고_수정-02.png" alt="">
        </div>
        <div class="loginBox">
            <h2>로그인</h2>
            <input id="id" type="text" placeholder="전화번호 혹은 이메일">
            <input id="passWord" type="password" placeholder="비밀번호">
            
            <button id="enter">로그인</button>
            <div class="find">
                <p>비밀번호를 잊으셨나요?</p>
                <button id="findBtn">비밀번호 찾기</button>
            </div>
        </div>
    </div>

    <script src="./login.js"></script>
</body>
</html>
