<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/signup.css">
</head>
<body>
    <div class="wrap">
        <div class="signupBox">
            <button class="closeBtn" id="closeBtn" aria-label="닫기">&times;</button>
            <button class="backBtn" id="backBtn" aria-label="뒤로가기">&larr;</button>
            <h2>회원 가입</h2>

            <div class="inBox">
                <label for="name">이름</label>
                <input id="name" type="text" placeholder="이름">
                <p class="errorMsg" id="nameError"></p>
            </div>
            <div class="inBox">
                <label for="id">전화번호 혹은 이메 일</label>
                <input id="id" type="text" placeholder="전화번호 혹은 이메일">
                <p class="errorMsg" id="idError"></p>
            </div>
            <div class="inBox">
                <label for="passWord">비밀번호</label>
                <input id="passWord" type="password" placeholder="비밀번호">
                <p class="errorMsg" id="pwError"></p>
            </div>
            <div class="inBox">
                <label for="passWordCheck">비밀번호 확인</label>
                <input id="passWordCheck" type="password" placeholder="비밀번호 확인">
                <p class="errorMsg" id="pwCheckError"></p>
            </div>
            <button id="signupCheck">회원 가입</button>
        </div>
    </div>

    <script src="./script/signup.js"></script>
</body>
</html>
