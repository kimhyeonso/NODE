<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>찾기</title>
    <link rel="stylesheet" href="./css/font.css">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/find.css">
</head>
<body>
    <div class="wrap">
        <div class="imgBox">
            <img src="./image/common/node_logo.png" alt="logo">
        </div>

        <div class="findBox">
            <h2>비밀번호 찾기</h2>
            <input id="findName" type="text" placeholder="이름을 입력하세요.">
            <input id="findId" type="text" placeholder="전화번호 혹은 이메일">
            <p class="errorMsg" id="errorMsg"></p>
            
            <button id="pwFind">확인하기</button>
        </div>
    </div>
    <script src="./script/find.js"></script>
</body>
</html>
