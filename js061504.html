<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스크롤 이벤트 1</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            list-style: none;
            color: inherit;
        }

        section{
            width: 100%;
            height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        .start{
            font-size: 60px;
            font-weight: bold;
        }

        .box{
            width: 700px;
            height: 300px;
            overflow: hidden;
            border-radius: 15px;
            background-color: antiquewhite;
            font-size: 30px;
            font-weight: bold;
            text-align: center;
            line-height: 300px;
            transition: all .9s;
        }

        .box1{
            transform: translateY(150px);
            opacity: .3;
        }

        .box1.on{
            transform: translateY(0);
            opacity: 1;
        }

        .box2{
            transform: scale(0);
            opacity: .3;
        }

        .box2.on{
            transform: scale(1);
            opacity: 1;
        }

        
        .box3 .paper{
            clip-path: inset(0 100% 0 0);
            background-color: rebeccapurple;
            transition: all .9s;
        }

        .box3.on .paper{
            clip-path: inset(0 0 0 0);
            
        }

        
    </style>
</head>
<body>
    <section class="start">
        스크롤 해보세요
    </section>
    <section>
        <div class="box box1">나는 아래에서 위로 올라올거야</div>
    </section>
    <section>
        <div class="box box2">나는 작아졌다가 커질거야</div>
    </section>
    <section>
        <div class="box box3">
            <div class="paper">
                나는 두루마리처럼 펼쳐질거야
            </div>
        </div>
    </section>
    
    <script>
        const boxs = document.querySelectorAll(".box")

        const observer = new IntersectionObserver(function(entries){
            entries.forEach(function(entry){
                if(entry.isIntersecting){
                    entry.target.classList.add("on")
                }else{
                    entry.target.classList.remove("on")
                }
            })
        },{
            threshold : .8
        })

        boxs.forEach(function(box){
            observer.observe(box)
        })

        
    </script>
</body>
</html>
