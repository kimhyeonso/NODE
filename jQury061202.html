    <style>
        @font-face {
            font-family: 'hyundai';
            src: url(./fontYouandiModernTR.ttf);
        }
        
        header{
            width: 100%;
            height: 80px;
            background-color: #fff;
            box-shadow: 0 2px 4px 0 rgba(0, 0, 0, 0.08);
            padding: 0 30px;

            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;

            position: fixed;
            top: 0;
        }

        .menuBox{
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menuBox .gnb{
            padding-left: 20px;
            display: flex;
            justify-content: center;
        }

        .menuBox .gnb a{
            font-family: 'hyundai';
            font-weight: 600;
            font-size: 18px;
            padding: 0 20px;
        }

        .iconBox{
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
        }

        .iconBox .info{
            display: flex;
            align-items: center;
        }

        .iconBox .info a{
            font-size: 14px;
            padding: 2px 6px;
        }

        .iconBox .icon{
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .iconBox .icon img{
            width: 35px;
            height: 35px;
            object-fit: cover;
            cursor: pointer;
        }
        
        .popup{
            width: 100%;
            height: 50px;
            background: #FFF461;
            padding: 0 80px;
            margin-top: 80px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .popup p {
            font-size: 16px;
            line-height: 22px;
            font-weight: 700;
        }

        .close{
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 15px;
            font-weight: 600;
        }

        .close .closeBtn img{
            width: 35px;
            height: 35px;
            object-fit: cover;
            cursor: pointer;
        }

    </style>

    <script>
    $(function(){
        $(".closeBtn").on("click",()=>{
            if($("#todayCheck").is(":checked")){
                setCookie("todaypopup","close",1)
            }

        $(".popup").hide()
        })

        function setCookie(name,value,day){
            let date = new Date();
            data.setDate(date.getDate() + day)
            document.cookie = `${name}=${value}; expires=${date.toUTCString()}; path=/`
        }

        function getCookie(name){
            let cook = document.cookie.split(";")

            for(let i = 0; i < cook.length; i++){
                let cookie = cook[i].trim()
                if(cookie.split("=")[0] === name){
                    return cookie.split("=")[1]
                }
            }

            return '';
        }

        if( getCookie("todaypopup") === "close"){
            $(".popup").hide()
        }
    })
</script>
